<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>Dashboard</a>
          <div class="nav-dropdown">
            <button
              type="button"
              class="nav-dropdown-toggle"
              {% if page.url == '/category/' %}aria-current="page"{% endif %}
              aria-expanded="false"
              aria-controls="header-category-menu"
            >
              <span>Category</span>
              <span class="nav-caret" aria-hidden="true">⌄</span>
            </button>
            <div class="nav-dropdown-menu" id="header-category-menu" role="menu" hidden>
              <a role="menuitem" href="{{ '/category/?type=all' | relative_url }}">All Categories</a>
              <a role="menuitem" href="{{ '/category/?type=terrace' | relative_url }}">Terrace</a>
              <a role="menuitem" href="{{ '/category/?type=apartment' | relative_url }}">Apartment</a>
              <a role="menuitem" href="{{ '/category/?type=semi-d' | relative_url }}">Semi D</a>
              <a role="menuitem" href="{{ '/category/?type=flat' | relative_url }}">Flat</a>
              <a role="menuitem" href="{{ '/category/?type=bungalo' | relative_url }}">Bungalo</a>
            </div>
          </div>
          <a href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}aria-current="page"{% endif %}>About</a>
        </nav>
      </div>
    </header>

    <main class="container page-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>{{ site.description }}</p>
      </div>
    </footer>
    <script>
      (function () {
        const dropdown = document.querySelector(".nav-dropdown");
        if (!dropdown) return;
        const toggle = dropdown.querySelector(".nav-dropdown-toggle");
        const menu = dropdown.querySelector(".nav-dropdown-menu");

        function closeMenu() {
          toggle.setAttribute("aria-expanded", "false");
          menu.hidden = true;
        }

        toggle.addEventListener("click", function () {
          const isOpen = toggle.getAttribute("aria-expanded") === "true";
          toggle.setAttribute("aria-expanded", String(!isOpen));
          menu.hidden = isOpen;
        });

        document.addEventListener("keydown", function (event) {
          if (event.key === "Escape") {
            closeMenu();
          }
        });

        document.addEventListener("click", function (event) {
          if (!dropdown.contains(event.target)) {
            closeMenu();
          }
        });
      })();
    </script>
  </body>
</html>
